services:
  - type: web
    name: querious-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://querious-seven.vercel.app
      # Set these in the Render dashboard (do not commit secrets):
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: 7d
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: AI_MODEL
        value: openai/gpt-oss-20b:free
      - key: MOCK_AI
        value: "false"
